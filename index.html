<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Random password generator
    </title>
    <link rel="stylesheet" href="styles.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&display=swap"
        rel="stylesheet">
</head>

<body>

    <header>
        <h1>Random password generator
        </h1>

    </header>

    <main>

        <div class="display">
            <p id="password">Generate Password</p>
            <button id="copyBtn">Copy</button>
        </div>



        <form action="">

            <div class="length">
                <label for="passLen">Password length:</label>
                <input type="range" min="1" max="32" step="1" value="8" id="passLen">
                <p id="pLen">8</p>
            </div>



            <div class="checkboxContainer">
                <p>Characters used:</p>

                <div class="checkbox"><label>
                        <input type="checkbox" name="charTypes" value="uppercase" checked id="uppercase">
                        <p>(A-Z)</p>
                    </label>

                    <label>
                        <input type="checkbox" name="charTypes" value="lowercase" checked id="lowercase">
                        <p>(a-z)</p>
                    </label>

                    <label>
                        <input type="checkbox" name="charTypes" value="numbers" checked id="numbers">
                        <p>(0-9)</p>
                    </label>

                    <label>
                        <input type="checkbox" name="charTypes" value="symbols" id="symbols">
                        <p>(#$&)</p>
                    </label>
                </div>

            </div>

            <div class="strength">
                <p id="strengthText"></p>

            </div>
            <button type="submit" id="submit">Generate</button>

        </form>
    </main>

    <script src="app.js"></script>
</body>

</html>
